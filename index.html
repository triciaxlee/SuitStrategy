<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Tailoring Strategy</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { Search, LayoutDashboard, Calendar, ChevronRight, X, Briefcase, TrendingUp, AlertTriangle, Lightbulb, BarChart3, GripVertical } from 'https://esm.sh/lucide-react';

    const initialTasks = [
      {
        id: 't1', colId: 'c1',
        title: 'Aritzia (Premium Specialty)',
        snippet: 'Dominating urban US markets. FY25 Rev: $2.74B CAD. Positioned above fast fashion, below luxury.',
        details: 'Aritzia captures outsized market share with high four-wall productivity and elevated basics (e.g., The Effortless Pant). Blazers range from $150-$250. Their strategy focuses on exclusive in-house brands, a strong omnichannel presence, and aiming for $3.5B+ revenue by FY27.',
        tags: ['Competitor', 'Premium'],
        metrics: { 'Price': '$150-$250', 'FY25 Rev': '$2.74B CAD' }
      },
      {
        id: 't2', colId: 'c1',
        title: 'Zara & Fast Fashion',
        snippet: 'Massive scale and speed-to-market. Oversized & cropped trend blazers at $70-$120.',
        details: 'Zara pressures the market on price and speed, leveraging global scale to compress fashion cycles. They rapidly adopt runway trends. However, their weakness lies in verifiable sustainability.',
        tags: ['Competitor', 'Mass Market']
      },
      {
        id: 't3', colId: 'c1',
        title: 'SuitShop & Quince (DTC)',
        snippet: 'Disrupting with inclusive sizing and value-driven sustainable basics.',
        details: 'SuitShop offers incredible fit consistency across sizes 00-24. Quince hits the $120 price point for matching sets using stretchy ponte and eco-fabrics.',
        tags: ['Competitor', 'DTC Disruptor']
      },
      {
        id: 't4', colId: 'c2',
        title: 'The Sizing & Fit Gap',
        snippet: 'Traditional brands lack robust Petite, Tall, and Plus options in physical inventory.',
        details: 'A massive gap in the 18-40 market is finding suits that actually fit without heavy tailoring. CHAMPIONING universal fit algorithms is a core pillar.',
        tags: ['Market Gap', 'Opportunity'],
        date: '2026-05-01', dateLabel: 'Immediate Priority'
      },
      {
        id: 't7', colId: 'c3',
        title: 'The Relaxed Power Suit',
        snippet: 'Broad shoulders, softer tailoring. Replacing the stiff, restrictive corporate suit.',
        details: 'The backbone of 2026/2027 suiting. Jackets are slightly longer with broader shoulders, but the waist is shaped without being squeezed.',
        tags: ['Fashion Trend', 'Design'],
        date: '2026-07-01', dateLabel: 'Q3 2026 Launch'
      },
      {
        id: 't11', colId: 'c4',
        title: 'Economic Instability',
        snippet: 'Suits are a discretionary purchase prone to deferral during economic crunches.',
        details: 'Mitigation: Position products as high-ROI, versatile "investment" pieces rather than single-use formalwear.',
        tags: ['Risk', 'Macro-Economic']
      }
    ];

    const columns = [
      { id: 'c1', title: 'Competitors', icon: <BarChart3 className="w-4 h-4" />, color: 'bg-blue-500', bg: 'bg-blue-50/50' },
      { id: 'c2', title: 'Marketing/Gaps', icon: <Briefcase className="w-4 h-4" />, color: 'bg-purple-500', bg: 'bg-purple-50/50' },
      { id: 'c3', title: 'Trends (2026+)', icon: <TrendingUp className="w-4 h-4" />, color: 'bg-pink-500', bg: 'bg-pink-50/50' },
      { id: 'c4', title: 'Risks', icon: <AlertTriangle className="w-4 h-4" />, color: 'bg-red-500', bg: 'bg-red-50/50' },
    ];

    function App() {
      const [tasks, setTasks] = useState(initialTasks);
      const [view, setView] = useState('board');
      const [activeTask, setActiveTask] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');

      const handleDragStart = (e, taskId) => {
        e.dataTransfer.setData('taskId', taskId);
      };
      
      const handleDrop = (e, colId) => {
        e.preventDefault();
        const taskId = e.dataTransfer.getData('taskId');
        if (taskId) {
          setTasks(tasks.map(t => t.id === taskId ? { ...t, colId } : t));
        }
      };

      const filteredTasks = tasks.filter(t => 
        t.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
        t.snippet.toLowerCase().includes(searchQuery.toLowerCase())
      );

      return (
        <div className="flex flex-col h-screen bg-slate-100 font-sans text-slate-900 overflow-hidden">
          <header className="bg-white border-b border-slate-200 px-6 py-4 flex flex-col md:flex-row md:items-center justify-between shrink-0 z-10 shadow-sm">
            <h1 className="text-2xl font-black text-slate-900 tracking-tight mb-4 md:mb-0">
              Aura Tailoring <span className="text-indigo-600">Strategy</span>
            </h1>
            
            <div className="flex items-center space-x-4">
              <input 
                type="text" 
                placeholder="Search..." 
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                className="px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:border-indigo-500 w-full md:w-64"
              />
              <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                <button onClick={() => setView('board')} className={`px-3 py-1.5 rounded-md text-sm font-bold ${view === 'board' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500'}`}>Board</button>
                <button onClick={() => setView('timeline')} className={`px-3 py-1.5 rounded-md text-sm font-bold ${view === 'timeline' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500'}`}>Timeline</button>
              </div>
            </div>
          </header>

          <main className="flex-1 overflow-hidden">
            {view === 'board' ? (
              <div className="h-full overflow-x-auto p-6">
                <div className="flex gap-6 h-full items-start min-w-max">
                  {columns.map(col => (
                    <div 
                      key={col.id}
                      className={`w-80 bg-white rounded-xl flex flex-col max-h-full border border-slate-200 shadow-sm ${col.bg}`}
                      onDragOver={(e) => e.preventDefault()}
                      onDrop={(e) => handleDrop(e, col.id)}
                    >
                      <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-white rounded-t-xl font-bold">
                        {col.title}
                      </div>
                      <div className="flex-1 overflow-y-auto p-3 space-y-3">
                        {filteredTasks.filter(t => t.colId === col.id).map(task => (
                          <div
                            key={task.id}
                            draggable
                            onDragStart={(e) => handleDragStart(e, task.id)}
                            onClick={() => setActiveTask(task)}
                            className="bg-white p-4 rounded-xl border border-slate-200 cursor-pointer hover:border-indigo-400 transition-all shadow-sm"
                          >
                            <h4 className="font-bold text-slate-900 text-sm mb-1">{task.title}</h4>
                            <p className="text-xs text-slate-500 line-clamp-2">{task.snippet}</p>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div className="h-full overflow-y-auto p-8">
                <div className="max-w-2xl mx-auto border-l-2 border-indigo-200 pl-8 space-y-8">
                  {filteredTasks.filter(t => t.date).map(task => (
                    <div key={task.id} onClick={() => setActiveTask(task)} className="bg-white p-6 rounded-xl border border-slate-200 cursor-pointer hover:shadow-md transition-all">
                      <span className="text-xs font-bold text-indigo-600 uppercase">{task.dateLabel}</span>
                      <h3 className="text-lg font-bold mt-1">{task.title}</h3>
                      <p className="text-sm text-slate-600 mt-2">{task.snippet}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          {activeTask && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm" onClick={() => setActiveTask(null)}>
              <div className="bg-white rounded-2xl max-w-lg w-full p-8 shadow-2xl" onClick={e => e.stopPropagation()}>
                <h2 className="text-2xl font-black mb-4">{activeTask.title}</h2>
                <p className="text-slate-700 leading-relaxed mb-6">{activeTask.details}</p>
                <button onClick={() => setActiveTask(null)} className="w-full py-3 bg-slate-900 text-white font-bold rounded-xl">Close</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
